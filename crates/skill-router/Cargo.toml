[package]
name = "skill-router"
version = "0.0.1"
edition = "2021"
license = "GPL-3.0-only"
description = "WebSocket/HTTP command routing, UMAP projection, embedding loaders, EEG metric rounding — extracted workspace crate"

[features]
default = ["gpu"]
gpu = ["dep:burn-cubecl", "dep:cubecl", "fast-umap/gpu"]
mlx = ["dep:burn-mlx", "fast-umap/mlx"]
cpu = ["burn/ndarray"]

[dependencies]
anyhow = { workspace = true }
skill-constants = { path = "../skill-constants" }
skill-commands  = { path = "../skill-commands" }
skill-data      = { path = "../skill-data" }
skill-settings  = { path = "../skill-settings" }
serde           = { version = "1", features = ["derive"] }
serde_json      = "1"
rusqlite = { workspace = true }
fast-umap       = { version = "1.6.0", default-features = false }
burn            = { version = "0.20.1", default-features = false, features = ["ndarray"] }
burn-cubecl     = { version = "0.20.1", optional = true }
burn-mlx        = { git = "https://github.com/eidola-ai/burn-mlx", branch = "burn-0-20", optional = true }
cubecl          = { version = "0.9.0", features = ["wgpu"], optional = true }
crossbeam-channel = "0.5.15"
half            = { version = "2.4", features = ["num-traits"] }

[lints]
workspace = true
