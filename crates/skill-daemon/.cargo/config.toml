# macOS linker flags: search_paths_first ensures system frameworks are found
# before any local paths; dead_strip removes unused symbols to reduce binary size.

[target.'cfg(target_os = "macos")']
rustflags = [
    "-C", "link-arg=-Wl,-search_paths_first",
    "-C", "link-arg=-Wl,-dead_strip",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-search_paths_first",
]
