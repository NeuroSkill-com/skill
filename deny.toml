# ── cargo-deny configuration ──────────────────────────────────────────────────
# Run: cargo deny check -A no-license-field -A parse-error -A license-not-encountered
# CI:  cargo deny --workspace check -A no-license-field -A parse-error -A license-not-encountered

[graph]
targets = []
all-features = false

# ── Advisories ────────────────────────────────────────────────────────────────
# cargo-deny 0.16+ schema (PR#611):
#   - vulnerability: removed — vulnerabilities are always denied unless ignored
#   - unmaintained: scope filter ("all" | "workspace" | "transitive" | "none")
#   - yanked: still a lint level ("deny" | "warn" | "allow")
#   - notice: removed
[advisories]
# "workspace" = error only if OUR OWN crates have unmaintained advisories;
# transitive dependency advisories are reported but don't fail CI.
# Equivalent to the old (removed) unmaintained = "warn".
unmaintained = "workspace"
yanked       = "warn"
ignore = [
    # gtk 0.18.2 — pulled transitively by tauri → tray-icon → libappindicator.
    # We cannot upgrade this ourselves; tracked for resolution when Tauri
    # drops the GTK3 dependency.
    { id = "RUSTSEC-2024-0415", reason = "transitive via tauri/libappindicator, not directly upgradeable" },
    # lru 0.12.5 — IterMut unsoundness, patched in >=0.16.3.
    # Pulled transitively; not directly used by workspace code paths that call IterMut.
    #
    # anyhow's RUSTSEC-2026-0190 (downcast_mut unsoundness) is fixed by upgrading
    # to anyhow >=1.0.103 (done in Cargo.lock), so it is NOT ignored here.
    #
    # quick-xml 0.30/0.37/0.39 — DoS advisories, fixed in >=0.41.0. Pinned by
    # tauri/plist (build-time codegen + macOS Info.plist parsing); reaching 0.41
    # needs a Tauri major bump. Inputs are trusted local config/plist, not
    # attacker-controlled network XML.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml <0.41 pinned transitively by tauri/plist; trusted local XML only" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml <0.41 pinned transitively by tauri/plist; trusted local XML only" },
    # DISABLED with rlx-tiny-tts (reshape bug on Metal + MLX). The onnx → protoc
    # codegen chain (protobuf 1.x, tempdir → remove_dir_all) only entered the
    # graph via rlx-tiny-tts; with that engine commented out no crate matches
    # these advisories, so cargo-deny warns `advisory-not-detected`. Re-enable
    # both lines together with rlx-tiny-tts in crates/skill-tts/Cargo.toml.
    #   protobuf 1.7.5 — recursion DoS, fixed in >=3.7.2 (build-only, never shipped)
    { id = "RUSTSEC-2024-0437", reason = "build-only protoc codegen via onnx/rlx-tiny-tts; not in shipped binary" },
    #   remove_dir_all 0.5.3 — TOCTOU, fixed in >=0.8.0 (build-only, via tempdir 0.3.7)
    # { id = "RUSTSEC-2023-0018", reason = "build-only protoc codegen via onnx/rlx-tiny-tts; not in shipped binary" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────
# cargo-deny 0.16+ removed `unlicensed` and `copyleft` (PR#611).
# Crates not matching an `allow`ed license are denied by default.
[licenses]
# Third-party crates in this workspace include several with missing/legacy
# license metadata. Keep SPDX allow-list enforcement, but avoid noisy
# warnings for unmatched allow entries and feature-gated optional deps.
unused-allowed-license = "allow"
unused-license-exception = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT-0",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "NCSA",
    "LicenseRef-AI100",
    # bzip2/libbz2 license (BSD-like permissive, valid SPDX identifier).
    # Used by libbz2-rs-sys, pulled transitively via the zip crate.
    "bzip2-1.0.6",
]
exceptions = [
    # Our own crates use GPL-3.0-only (Cargo.toml) / GPL-3.0 (deprecated SPDX alias)
    { allow = ["GPL-3.0-only"], crate = "skill" },
