# ── cargo-deny configuration ──────────────────────────────────────────────────
# Run: cargo deny check
# CI:  cargo deny --workspace check

[graph]
targets = []
all-features = false

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
vulnerability = "deny"
unmaintained  = "warn"
yanked        = "warn"
notice        = "warn"
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
unlicensed    = "deny"
copyleft      = "warn"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
exceptions = [
    # Our own crates are GPL-3.0-only
    { allow = ["GPL-3.0"], crate = "neuroskill" },
    { allow = ["GPL-3.0"], crate = "skill-autostart" },
    { allow = ["GPL-3.0"], crate = "skill-commands" },
    { allow = ["GPL-3.0"], crate = "skill-constants" },
    { allow = ["GPL-3.0"], crate = "skill-data" },
    { allow = ["GPL-3.0"], crate = "skill-devices" },
    { allow = ["GPL-3.0"], crate = "skill-eeg" },
    { allow = ["GPL-3.0"], crate = "skill-exg" },
    { allow = ["GPL-3.0"], crate = "skill-gpu" },
    { allow = ["GPL-3.0"], crate = "skill-headless" },
    { allow = ["GPL-3.0"], crate = "skill-health" },
    { allow = ["GPL-3.0"], crate = "skill-history" },
    { allow = ["GPL-3.0"], crate = "skill-jobs" },
    { allow = ["GPL-3.0"], crate = "skill-label-index" },
    { allow = ["GPL-3.0"], crate = "skill-llm" },
    { allow = ["GPL-3.0"], crate = "skill-router" },
    { allow = ["GPL-3.0"], crate = "skill-screenshots" },
    { allow = ["GPL-3.0"], crate = "skill-settings" },
    { allow = ["GPL-3.0"], crate = "skill-skills" },
    { allow = ["GPL-3.0"], crate = "skill-tools" },
    { allow = ["GPL-3.0"], crate = "skill-tray" },
    { allow = ["GPL-3.0"], crate = "skill-tts" },
    { allow = ["GPL-3.0"], crate = "skill-vision" },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"

skip = [
    # Known duplicates from transitive deps — tracked for consolidation
    { crate = "base64@0.13.1" },
    { crate = "base64@0.21.7" },
    { crate = "bitflags@1.3.2" },
]

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/eugenehp/cubek.git",
    "https://github.com/eugenehp/btleplug.git",
]
