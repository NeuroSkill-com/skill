version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm-all:
        patterns:
          - "*"
    ignore:
      # typescript is capped at 6.x: @sveltejs/kit's peer range is
      # "^5.3.3 || ^6.0.0", so a major bump to 7.x breaks a fresh
      # `npm install` with ERESOLVE (see issue #81, regression from #75).
      # Drop this once kit widens its peerDependencies to include TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(cargo)"
    groups:
      cargo-all:
        patterns:
          - "*"
    ignore:
      # wgpu cannot be upgraded independently: zuna-rs and luna-rs require wgpu 26.x.
      # Upgrade wgpu together with the encoder crates.
      - dependency-name: "wgpu"
        versions: [">=27"]
