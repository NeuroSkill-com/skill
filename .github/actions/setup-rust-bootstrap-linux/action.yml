name: Setup Rust bootstrap (Linux)
description: Install Rust toolchain for Linux jobs (rust-cache is configured by the caller).

inputs:
  targets:
    description: Optional rustup targets (comma-separated or single target)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust stable (default target)
      if: inputs.targets == ''
      uses: dtolnay/rust-toolchain@stable

    - name: Install Rust stable (custom targets)
      if: inputs.targets != ''
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.targets }}
