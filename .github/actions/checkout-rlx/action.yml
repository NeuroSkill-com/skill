name: Checkout RLX
description: >-
  No-op in CI: rlx / rlx-models are resolved from crates.io (pinned =0.2.11 in
  the workspace). ../rlx is local-development only. Kept as a composite action so
  existing workflow call sites stay valid; the scripts short-circuit under CI.

inputs:
  ref:
    description: Ignored in CI (kept for call-site compatibility).
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: rlx from crates.io (no sibling checkout in CI)
      shell: bash
      env:
        GITHUB_ACTIONS: "true"
      run: |
        bash scripts/ensure-rlx.sh
        bash scripts/ensure-rlx-models.sh
