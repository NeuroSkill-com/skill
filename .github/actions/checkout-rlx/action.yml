name: Checkout RLX
description: >-
  Build the workspace against MIT-RLX/rlx + rlx-models from git instead of
  crates.io. Each repo is a STANDALONE unit: its ref is resolved to a commit SHA
  (cheap `git ls-remote`, no clone) and cached under its OWN key, so a push to
  rlx-models never invalidates the rlx cache (and vice-versa). Only the changed
  repo re-clones. After both are present, wires a cargo `[patch.crates-io]`
  override and refreshes Cargo.lock so `--locked` build/test steps still pass.

  Both repos are public, so no token is needed. Default ref is `main` (the most
  recent commit); the resolved SHA feeds each cache key, so unchanged upstream =
  instant restore. Pin a job by passing rlx-ref / rlx-models-ref a tag or SHA,
  or set enabled=false to fall back to the crates.io build.

inputs:
  rlx-ref:
    description: git ref (branch, tag, or full SHA) for MIT-RLX/rlx.
    required: false
    default: main
  rlx-models-ref:
    description: git ref (branch, tag, or full SHA) for MIT-RLX/rlx-models.
    required: false
    default: main
  enabled:
    description: When "false", no-op and build rlx/rlx-models from crates.io.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # ── Resolve refs → commit SHAs ────────────────────────────────────────────
    # `git ls-remote` is a metadata-only call (no objects), so this is where each
    # cache key comes from without paying for a clone. A full SHA passed as the
    # ref won't appear in ls-remote output, so we fall back to using it verbatim.
    - name: Resolve RLX commit SHAs
      if: inputs.enabled == 'true'
      id: rev
      shell: bash
      run: |
        set -euo pipefail
        resolve() { # $1 url  $2 ref -> full SHA
          local sha
          sha="$(git ls-remote "$1" "$2" | awk 'NR==1{print $1}')"
          [ -n "$sha" ] || sha="$2"
          printf '%s' "$sha"
        }
        rlx_sha="$(resolve https://github.com/MIT-RLX/rlx.git        '${{ inputs.rlx-ref }}')"
        mdl_sha="$(resolve https://github.com/MIT-RLX/rlx-models.git '${{ inputs.rlx-models-ref }}')"

        # Check the shallow clones out NEXT TO the workspace, so the cargo
        # [patch] override (written to ../.cargo/config.toml by ensure-rlx.sh)
        # is discovered as an ancestor config — the same layout local dev uses.
        # Normalise to a mixed path (C:/…) on Windows so git-bash, cargo, and
        # actions/cache all agree; a plain POSIX path elsewhere.
        ws="$GITHUB_WORKSPACE"
        if command -v cygpath >/dev/null 2>&1; then ws="$(cygpath -u "$GITHUB_WORKSPACE")"; fi
        parent="$(cd "$ws/.." && pwd)"
        if command -v cygpath >/dev/null 2>&1; then parent="$(cygpath -m "$parent")"; fi

        {
          echo "rlx_sha=$rlx_sha"
          echo "mdl_sha=$mdl_sha"
          echo "rlx_dir=$parent/rlx"
          echo "mdl_dir=$parent/rlx-models"
        } >> "$GITHUB_OUTPUT"
        echo "rlx        @ $rlx_sha (${{ inputs.rlx-ref }})"
        echo "rlx-models @ $mdl_sha (${{ inputs.rlx-models-ref }})"

    # ── rlx: standalone cache, keyed on rlx's SHA alone ───────────────────────
    - name: Restore rlx source cache
      if: inputs.enabled == 'true'
      id: cache_rlx
      uses: actions/cache@v5
      with:
        path: ${{ steps.rev.outputs.rlx_dir }}
        key: rlx-src-${{ runner.os }}-${{ steps.rev.outputs.rlx_sha }}

    - name: Shallow-clone rlx (cache miss)
      if: inputs.enabled == 'true' && steps.cache_rlx.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        dst='${{ steps.rev.outputs.rlx_dir }}'
        rm -rf "$dst"
        git init -q "$dst"
        git -C "$dst" remote add origin https://github.com/MIT-RLX/rlx.git
        git -C "$dst" -c protocol.version=2 fetch -q --depth 1 origin '${{ steps.rev.outputs.rlx_sha }}'
        git -C "$dst" checkout -q --detach FETCH_HEAD
        rm -rf "$dst/.git"   # history not needed; keeps the cache tiny
        echo "cloned rlx -> $dst"

    # ── rlx-models: standalone cache, keyed on rlx-models' SHA alone ──────────
    - name: Restore rlx-models source cache
      if: inputs.enabled == 'true'
      id: cache_mdl
      uses: actions/cache@v5
      with:
        path: ${{ steps.rev.outputs.mdl_dir }}
        key: rlx-models-src-${{ runner.os }}-${{ steps.rev.outputs.mdl_sha }}

    - name: Shallow-clone rlx-models (cache miss)
      if: inputs.enabled == 'true' && steps.cache_mdl.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        dst='${{ steps.rev.outputs.mdl_dir }}'
        rm -rf "$dst"
        git init -q "$dst"
        git -C "$dst" remote add origin https://github.com/MIT-RLX/rlx-models.git
        git -C "$dst" -c protocol.version=2 fetch -q --depth 1 origin '${{ steps.rev.outputs.mdl_sha }}'
        git -C "$dst" checkout -q --detach FETCH_HEAD
        rm -rf "$dst/.git"   # history not needed; keeps the cache tiny
        echo "cloned rlx-models -> $dst"

    # ── Wire the [patch] override + refresh Cargo.lock ────────────────────────
    # Runs once, after BOTH checkouts exist (ensure-rlx.sh writes a single
    # [patch.crates-io] block spanning both repos and refreshes the lock once).
    # RLX_CI_PATCH=1 tells ensure-rlx.sh to skip its "CI uses crates.io"
    # short-circuit and run `cargo metadata` (no --locked) so the on-disk
    # Cargo.lock matches the patched sources before any --locked cargo step.
    - name: Wire cargo [patch] override
      if: inputs.enabled == 'true'
      shell: bash
      env:
        RLX_CI_PATCH: "1"
        RLX_ROOT: ${{ steps.rev.outputs.rlx_dir }}
        RLX_MODELS_ROOT: ${{ steps.rev.outputs.mdl_dir }}
      run: bash scripts/ensure-rlx.sh

    - name: RLX from crates.io (disabled)
      if: inputs.enabled != 'true'
      shell: bash
      run: echo "checkout-rlx enabled=false - building rlx/rlx-models from crates.io"
