name: Setup Vulkan SDK (Linux)
description: Add LunarG apt repository for Vulkan SDK availability

runs:
  using: composite
  steps:
    # Add the LunarG apt repository so vulkan-sdk is available to apt.
    # The actual package install is handled by the caller's cache-apt-pkgs-action
    # step (vulkan-sdk must be included in that step's package list).
    - name: Add LunarG Vulkan apt repository
      shell: bash
      run: |
        set -eo pipefail
        CODENAME="$(lsb_release -cs 2>/dev/null || (source /etc/os-release && echo "${VERSION_CODENAME:-noble}"))"
        if [[ ! -f "/etc/apt/sources.list.d/lunarg-vulkan-${CODENAME}.list" ]]; then
          curl -fsSL https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo curl -fsSLo \
            "/etc/apt/sources.list.d/lunarg-vulkan-${CODENAME}.list" \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${CODENAME}.list"
          sudo apt-get update -y -q
        fi
