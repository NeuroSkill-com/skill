name: Setup Vulkan SDK (Linux)
description: Cache and install Vulkan SDK for Linux builds

inputs:
  cache-key-prefix:
    description: Cache key prefix
    required: false
    default: "linux-vulkan-sdk"

runs:
  using: composite
  steps:
    - name: Cache Vulkan SDK
      id: cache-vulkan
      uses: actions/cache@v5
      with:
        path: |
          /etc/apt/sources.list.d/lunarg-vulkan-*
          /usr/lib/x86_64-linux-gnu/libvulkan*
          /usr/include/vulkan
          /usr/share/vulkan
        key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('scripts/install-vulkan-sdk.sh') }}

    - name: Install Vulkan SDK
      if: steps.cache-vulkan.outputs.cache-hit != 'true'
      shell: bash
      run: bash scripts/install-vulkan-sdk.sh
