name: Homebrew cask

# Keeps Casks/neuroskill.rb pinned to the latest *stable* GitHub release.
#
# Why a reconcile (not a step inside Release - Mac): a release published with the
# default GITHUB_TOKEN cannot, by design, trigger another workflow, so a
# `release: [released]` trigger would never fire. Instead this job runs after the
# mac release build completes (and on a weekly safety net), reads the current
# latest stable release, and opens a PR whenever the cask has drifted. RC builds
# are harmless: the reconcile always targets the latest *stable*, so an RC run
# finds no drift and does nothing.
on:
  workflow_run:
    workflows: ["Release - Mac"]
    types: [completed]
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:
    inputs:
      version:
        description: "Version to pin (e.g. 0.0.130); defaults to the latest stable release"
        required: false

permissions:
  contents: write # push the reconcile branch
  pull-requests: write # open the bump PR

concurrency:
  group: homebrew-cask
  cancel-in-progress: false

jobs:
  reconcile:
    name: Reconcile Homebrew cask
    runs-on: ubuntu-latest
    # For workflow_run, only proceed when the upstream build actually succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Reconcile cask to latest stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            ARGS="--version ${{ github.event.inputs.version }}"
          fi
          node scripts/ci.mjs update-cask $ARGS

      - name: Open PR if the cask drifted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- Casks/neuroskill.rb; then
            echo "Cask already current — nothing to do."
            exit 0
          fi

          VERSION="$(sed -n 's/^[[:space:]]*version "\(.*\)"/\1/p' Casks/neuroskill.rb | head -1)"
          BRANCH="automated/homebrew-cask"
          TITLE="chore(homebrew): bump cask to v${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add Casks/neuroskill.rb
          git commit -m "$TITLE"
          git push --force origin "$BRANCH"

          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "PR already open for $BRANCH — branch updated in place."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated reconcile of \`Casks/neuroskill.rb\` to the latest stable release (v${VERSION}). Generated by \`.github/workflows/homebrew-cask.yml\`."
          fi
