name: Release - Mac

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # WidgetKit signing currently breaks Apple notarization (Invalid). Set to
  # 'true' to re-enable once appex signing/timestamps are fixed.
  ENABLE_WIDGETKIT: 'false'

jobs:
  release:
    name: Build & Release — aarch64-apple-darwin
    runs-on: macos-26
    environment: Release

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so git tag --format can read the annotation

      # ── Verify tag matches tauri.conf.json version ────────────────────────────
      # Catches "forgot to bump the version" before wasting 20 min on a build.
      - name: Resolve version
        id: version_meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF:        ${{ github.ref }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
        run: node scripts/ci.mjs resolve-version

      - name: Release setup (Rust + Node)
        uses: ./.github/actions/release-setup
        with:
          target: aarch64-apple-darwin
          macos-tools: "true"

      # ── Pre-flight: verify every secret is set ───────────────────────────────
      # Catches missing / renamed secrets in seconds instead of after a 15-minute
      # build.  Each variable is checked for non-empty; none of the values are
      # printed.
      - name: Verify signing and notarization secrets are present
        env:
          APPLE_CERTIFICATE:             ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:    ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:        ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                      ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY:     ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: >-
          node scripts/ci.mjs verify-secrets
          APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
          APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY

      # ── Pre-flight: validate APPLE_SIGNING_IDENTITY is the right cert type ───
      # Only `Developer ID Application` certs pass Gatekeeper for distribution.
      # Apple Development / Mac Developer / ad-hoc / self-signed all silently
      # break the runtime Safari extension flow on end-user Macs (Safari refuses
      # to load extensions from Gatekeeper-rejected apps). Fail fast here.
      - name: Validate Apple signing identity is Developer ID Application
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/ci.mjs validate-apple-signing-identity

      # ── Pre-flight: validate Apple notarization credentials ───────────────────
      # xcrun notarytool history authenticates against Apple's API using the same
      # credentials the build will use, but without submitting anything.
      # A 401 here means the app-specific password is wrong or expired.
      # Generate a fresh one at https://appleid.apple.com → App-Specific Passwords,
      # then update the APPLE_PASSWORD secret in the repository environment.
      - name: Validate Apple notarization credentials
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: node scripts/ci.mjs validate-notarization

      # ── Apple Developer certificate → temporary keychain ─────────────────────
      #
      # Secrets required:
      #   APPLE_CERTIFICATE          — base64-encoded .p12 (Developer ID Application cert)
      #   APPLE_CERTIFICATE_PASSWORD — password protecting the .p12
      #
      # How to export the .p12:
      #   Keychain Access → right-click cert → Export → Personal Information Exchange
      #   Then: base64 -i cert.p12 | pbcopy   (paste into the GitHub secret)
      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: node scripts/ci.mjs import-apple-cert

      # ── WidgetKit extension (optional; off until notarization-safe) ─────────
      - name: Install XcodeGen
        if: env.ENABLE_WIDGETKIT == 'true'
        run: brew install xcodegen

      - name: Setup WidgetKit signing
        if: env.ENABLE_WIDGETKIT == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_KEY_ISSUER_ID: ${{ secrets.APPLE_ASC_KEY_ISSUER_ID }}
          APPLE_ASC_KEY_BASE64: ${{ secrets.APPLE_ASC_KEY_BASE64 }}
          APPLE_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: node scripts/ci.mjs setup-widget-signing

      - name: Build WidgetKit extension
        if: env.ENABLE_WIDGETKIT == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          AUTH_KEY_PATH: ${{ env.AUTH_KEY_PATH }}
          AUTH_KEY_ID: ${{ env.AUTH_KEY_ID }}
          AUTH_KEY_ISSUER_ID: ${{ env.AUTH_KEY_ISSUER_ID }}
        run: node scripts/ci.mjs build-widgets

      # ── Compile: frontend + Rust binary + sidecar ───────────────────────────
      #
      # `npx tauri build` crashes on macOS 26 with SIGILL *after* compilation,
      # inside the Tauri CLI napi binary's bundling code.  The crash occurs
      # regardless of --no-sign, pointing to the icon/resource pipeline (likely
      # SIMD image-processing code that emits ud2 on this CPU).
      #
      # Fix: invoke the two compile steps directly and assemble the .app in the
      # next step, bypassing the Tauri CLI bundler entirely.
      #
      # npm run build  → SvelteKit/Vite frontend (output: build/, embedded by
      #                  generate_context!() when custom-protocol is enabled)
      # cargo build    → Rust binary; build.rs also copies espeak-ng-data into
      #                  src-tauri/resources/ so it is ready for bundling.
      #
      # --features custom-protocol is required: without it Tauri compiles in
      # dev mode and the binary tries to load the UI from localhost:1420
      # instead of serving the embedded SvelteKit build output.  The Tauri
      # CLI (`npx tauri build`) injects this feature automatically, but we
      # bypass the CLI here to avoid its post-compilation SIGILL.
      - name: Compile (frontend + Rust + sidecar)
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          npm run -s verify:tauri:frontend
          # NOTE: `|| return $?` after each cargo invocation is required.
          # `set -e` is inhibited inside a function called via `if ! cmd` /
          # captured exit code, so without explicit `|| return` a failing
          # cargo build would silently continue and run_cmd would still return 0.
          run_cmd() {
            cargo build -p skill-daemon --release --locked --target aarch64-apple-darwin --features apple --timings || return $?
            cargo build -p skill-tty --release --locked --target aarch64-apple-darwin --timings || return $?
            cargo build -p skill --release --locked --target aarch64-apple-darwin --features custom-protocol --timings || return $?
          }
          if ! run_cmd; then
            exit 1
          fi

      # ── Assemble + sign .app bundle ─────────────────────────────────────
      - name: Create .app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          FRONTEND_BUILD_DIR: build
          SKIP_WIDGETS: ${{ env.ENABLE_WIDGETKIT == 'true' && '0' || '1' }}
        run: bash scripts/assemble-macos-app.sh aarch64-apple-darwin

      # ── Smoke-test bundled binaries ──────────────────────────────────────
      - name: Smoke-test bundled binaries
        run: |
          set -euo pipefail
          APP_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/NeuroSkill.app"

          echo "── codesign verification ──"
          codesign --verify --deep --strict "$APP_DIR"
          echo "✓ codesign --verify passed"

          echo "── daemon binary check ──"
          DAEMON_BIN="$APP_DIR/Contents/MacOS/skill-daemon.app/Contents/MacOS/skill-daemon"
          file "$DAEMON_BIN"
          file "$DAEMON_BIN" | grep -q "Mach-O.*arm64" \
            || { echo "::error::skill-daemon is not a valid arm64 Mach-O binary"; exit 1; }
          echo "✓ skill-daemon is a valid arm64 Mach-O binary"

          echo "── main binary architecture check ──"
          MAIN_BIN="$APP_DIR/Contents/MacOS/NeuroSkill"
          lipo -info "$MAIN_BIN"
          lipo -info "$MAIN_BIN" | grep -q "arm64" \
            || { echo "::error::NeuroSkill binary does not contain arm64 architecture"; exit 1; }
          echo "✓ NeuroSkill binary contains arm64 architecture"

      # ── Upload cargo build timings ─────────────────────────────────────────
      # The --timings flag produces an HTML report showing per-crate compile
      # durations.  Upload it so slow crates can be identified and targeted.
      - name: Upload cargo build timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-macos
          path: src-tauri/target/cargo-timings/
          retention-days: 30

      # ── Create DMG (background, README, CHANGELOG, LICENSE) ────────────────
      #
      # Uses sindresorhus/create-dmg via scripts/create-macos-dmg.sh which:
      #   • Creates DMG with composed icon, Retina background, SLA
      #   • Notarizes with Apple (staples both DMG and .app)
      - name: Install DMG dependencies
        run: |
          # npm@latest no longer runs dependency install scripts by default, so
          # appdmg's native deps (fs-xattr, macos-alias) skip their node-gyp build
          # and `volume.node` goes missing. Allowlist their scripts explicitly.
          npm install --global appdmg --allow-scripts=fs-xattr,macos-alias
          pip3 install --quiet --break-system-packages Pillow

      - name: Create DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:               ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:         ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:          ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Creating DMG with version ${{ steps.version_meta.outputs.version }}"
          bash scripts/create-macos-dmg.sh aarch64-apple-darwin
          # Verify the DMG was created with the correct version
          DMG_FILE=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          if [[ "$DMG_FILE" == *"${{ steps.version_meta.outputs.version }}"* ]]; then
            echo "✓ DMG filename contains correct version: ${{ steps.version_meta.outputs.version }}"
          else
            echo "::error::DMG filename does not contain expected version"
            exit 1
          fi

      # ── Create updater artifact from the signed + stapled .app ─────────────
      #
      # Runs after Create DMG so the .app is already notarized and stapled.
      # The Tauri bundler never ran, so there is no stale .tar.gz to clean up.
      # This step creates the updater bundle from scratch and signs it with the
      # Ed25519 key.  `npx tauri signer sign` is safe here — it is pure
      # cryptography with no macOS-API bundling code, so it does not hit the
      # SIGILL that kills `npx tauri build`.
      - name: Recreate updater artifact from signed .app
        if: steps.version_meta.outputs.is_release == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_BUNDLE="$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)"

          # No stale artifacts to remove (Tauri bundler never ran).
          # Belt-and-suspenders: delete any partial files if this step retries.
          find "$BUNDLE_DIR/macos" \
            \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -delete

          # Create tarball from the signed + notarized + stapled .app.
          # Use an ASCII-only filename for the tarball so the URL stored in
          # latest.json is a valid RFC 3986 URI; non-ASCII characters such as ™
          # (U+2122) in the filename cause the Tauri updater to produce a 404
          # because its HTTP client rejects or misroutes an un-encoded URL.
          # The .app bundle inside the tar keeps its original NeuroSkill.app name.
          VERSION="${{ steps.version_meta.outputs.version }}"
          TAR_PATH="$BUNDLE_DIR/macos/NeuroSkill_${VERSION}_aarch64.app.tar.gz"
          tar -czf "$TAR_PATH" \
            -C "$(dirname "$APP_BUNDLE")" "$(basename "$APP_BUNDLE")"

          # Sign with Tauri's Ed25519 key.
          # FILE is a positional argument in Tauri v2; -f is now --private-key-path
          # and would conflict with the TAURI_SIGNING_PRIVATE_KEY env var (--private-key).
          npx tauri signer sign "$TAR_PATH"

      # ── Always delete the temporary keychain ──────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ── Locate build artifacts ────────────────────────────────────────────────
      - name: Collect artifact paths
        if: steps.version_meta.outputs.is_release == 'true'
        id: artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          APP_TAR="$(find "$BUNDLE_DIR/macos" \
                       -name "*.app.tar.gz" ! -name "*.sig" \
                       -maxdepth 1 | head -1)"
          APP_SIG="$(find "$BUNDLE_DIR/macos" \
                       -name "*.app.tar.gz.sig" \
                       -maxdepth 1 | head -1)"
          DMG="$(find "$BUNDLE_DIR/dmg" \
                   -name "*.dmg" \
                   -maxdepth 1 | head -1)"

          if [ -z "$APP_TAR" ] || [ -z "$APP_SIG" ] || [ -z "$DMG" ]; then
            echo "::error::One or more expected artifacts are missing."
            echo "  APP_TAR : $APP_TAR"
            echo "  APP_SIG : $APP_SIG"
            echo "  DMG     : $DMG"
            exit 1
          fi

          echo "app_tar=$APP_TAR"                  >> "$GITHUB_OUTPUT"
          echo "app_sig=$APP_SIG"                  >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG"                          >> "$GITHUB_OUTPUT"
          echo "app_tar_name=$(basename "$APP_TAR")" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG")"         >> "$GITHUB_OUTPUT"

          echo "Artifacts found:"
          echo "  TAR : $APP_TAR  ($(du -sh "$APP_TAR" | cut -f1))"
          echo "  SIG : $APP_SIG"
          echo "  DMG : $DMG  ($(du -sh "$DMG" | cut -f1))"

      # ── Create GitHub Release + upload macOS binary assets ───────────────────
      #
      # Creates (or updates) the release and uploads the macOS-specific binaries.
      # latest.json is handled in the next step so that the Windows and Linux
      # release workflows can each merge their own platform entry without
      # overwriting each other.
      #
      # macOS assets uploaded here:
      #   NeuroSkill_<ver>_aarch64.dmg       — drag-to-install disk image
      #   NeuroSkill.app.tar.gz              — Tauri updater bundle
      #   NeuroSkill.app.tar.gz.sig          — Ed25519 signature for the updater
      - name: Prepare changelog notes for release
        if: steps.version_meta.outputs.is_release == 'true'
        run: |
          TAG="${{ steps.version_meta.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV_TAG:+$PREV_TAG..}$TAG"
          node scripts/ci.mjs prepare-changelog \
            "${{ steps.version_meta.outputs.version }}" release-notes.md "$RANGE"

      - name: Create GitHub Release
        if: steps.version_meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name:               ${{ steps.version_meta.outputs.tag }}
          name:                   Skill v${{ steps.version_meta.outputs.version }}
          generate_release_notes: false
          body_path:              release-notes.md
          fail_on_unmatched_files: true
          # `prerelease` is derived from the version string: any `-rc.N` suffix
          # marks the build as a release candidate. GitHub treats prereleases
          # specially — `releases/latest/download/...` URLs skip them — so the
          # stable update channel automatically ignores RCs without any client
          # configuration. RC users hit the rc-latest mirror updated below.
          prerelease:             ${{ steps.version_meta.outputs.prerelease == 'true' }}
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.app_tar }}
            ${{ steps.artifacts.outputs.app_sig }}

      # ── Update latest.json ────────────────────────────────────────────────────
      #
      # Downloads the current latest.json from the release (if a Windows or Linux
      # platform workflow already uploaded one), merges the darwin-aarch64 entry,
      # then re-uploads via `gh release upload --clobber`.
      # If no latest.json exists yet this step creates one from scratch.
      #
      # All three platform release workflows (macOS, Windows, Linux) use the same
      # download → merge → upload pattern, so the single file at:
      #   https://github.com/NeuroSkill-com/skill/releases/latest/download/latest.json
      # accumulates entries for every platform as each build completes.
      # The Tauri updater reads only its own platform key (e.g. "darwin-aarch64")
      # and ignores the rest, so a partial manifest is valid while other platform
      # builds are still in flight.
      - name: Update latest.json
        if: steps.version_meta.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        # `--mirror-to-rc-latest` also pushes the manifest to the mutable
        # `rc-latest` GitHub Release, which is the URL the RC update channel
        # polls. Both stable and RC builds mirror, so RC opt-in users always
        # see the most recent build of either kind. The release is bootstrapped
        # automatically on the first run via cmdEnsureRcLatestRelease.
        run: >-
          node scripts/ci.mjs update-latest-json
          --platform darwin-aarch64
          --url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version_meta.outputs.tag }}/${{ steps.artifacts.outputs.app_tar_name }}"
          --sig-file "${{ steps.artifacts.outputs.app_sig }}"
          --tag "${{ steps.version_meta.outputs.tag }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --upload
          --mirror-to-rc-latest

      # ── Upload CI artifacts (manual / on-demand builds only) ────────────────
      - name: Upload build artifacts
        if: steps.version_meta.outputs.is_release != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: NeuroSkill-macOS-${{ steps.version_meta.outputs.version }}
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 14

      # ── Discord notification ────────────────────────────────────────────────
      - name: Notify Discord of release
        if: always() && steps.version_meta.outputs.is_release == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: >-
          node scripts/ci.mjs discord-notify
          --status  "${{ job.status }}"
          --title   "${{ job.status == 'success' && '🚀' || '💥' }} NeuroSkill™ v${{ steps.version_meta.outputs.version }} — macOS ${{ job.status == 'success' && 'Published' || 'Failed' }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --tag     "${{ steps.version_meta.outputs.tag }}"
          --platform "macOS aarch64"
          --release-url "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version_meta.outputs.tag }}"
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
